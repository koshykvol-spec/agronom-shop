<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Схеми захисту рослин</title>
    <meta name="description" content="Схеми захисту рослин: 54 готові схеми для саду, городу й теплиці — препарати за культурою та стадією. Агроном, м. Володимир.">
    <link rel="canonical" href="https://agronom.pp.ua/protection_schemes.html">
    <meta property="og:title" content="Схеми захисту рослин — Агроном">
    <meta property="og:image" content="https://agronom.pp.ua/android-chrome-512x512.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Nunito', sans-serif; background: #f5f5f5; }
        
        .schemes-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .schemes-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .schemes-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--green);
            margin-bottom: 10px;
        }
        
        /* Категорії */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .category-card {
            background: var(--white);
            border-radius: var(--r-md);
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 5px solid var(--green);
            box-shadow: var(--sh-1);
        }

        .category-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--sh-3);
        }

        .category-icon { font-size: 2.5rem; margin-bottom: 10px; }
        .category-name { font-size: 1.1rem; font-weight: 700; color: var(--green); margin-bottom: 5px; }
        .category-cultures { font-size: 0.85rem; color: var(--text-mute); }

        .btn-back {
            display: none;
            background: var(--green);
            color: var(--white);
            padding: 12px 24px;
            border: none;
            border-radius: var(--r);
            cursor: pointer;
            font-weight: 600;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 9999;
            box-shadow: var(--sh-2);
        }

        .btn-back.active {
            display: inline-block;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-back:hover {
            background: var(--green-d);
            box-shadow: 0 6px 16px rgba(0,0,0,0.25);
        }

        .scheme-item {
            background: var(--white);
            border-radius: var(--r-md);
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: var(--sh-1);
        }
        
        .scheme-header {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .scheme-title { font-size: 1.3rem; font-weight: 700; color: var(--green); }
        .scheme-timing { display: inline-block; background: var(--gp); padding: 8px 16px; border-radius: var(--r-lg); font-size: 0.9rem; color: var(--green); font-weight: 600; margin-top: 10px; }

        .treatments-list { display: flex; flex-direction: column; gap: 15px; }

        .treatment {
            background: linear-gradient(135deg, #f8f8f8 0%, #fff 100%);
            border-left: 4px solid var(--green-l);
            padding: 15px;
            border-radius: var(--r);
        }
        
        .treatment-stage { font-weight: 700; color: var(--green); margin-bottom: 8px; }
        .treatment-date { display: inline-block; background: #d4edda; padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; color: #155724; margin-bottom: 10px; font-weight: 600; }
        
        .treatment-problem {
            background: #ffe8e8;
            border-left: 3px solid #d9534f;
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
            font-size: 0.9rem;
        }
        
        .treatment-prep-type {
            background: #e3f2fd;
            border-left: 3px solid #2196f3;
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
            font-size: 0.9rem;
            color: #1976d2;
        }
        
        .products-section {
            background: #f0f8f0;
            border: 2px solid var(--green-l);
            border-radius: var(--r);
            padding: 15px;
            margin-top: 15px;
        }

        .products-title { font-weight: 700; color: var(--green); margin-bottom: 12px; }
        .products-list { display: flex; flex-direction: column; gap: 10px; }

        .product-item {
            background: var(--white);
            border-radius: 10px;
            padding: 10px 14px 10px 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
            transition: box-shadow .15s, transform .15s, border-color .15s;
            cursor: pointer;
            border: 1.5px solid transparent;
            user-select: none;
        }
        .product-item:hover {
            box-shadow: 0 4px 14px rgba(45,106,45,0.18);
            transform: translateY(-2px);
            border-color: var(--green-l);
        }
        .product-item:active {
            transform: translateY(0);
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
        }
        .product-item.added {
            border-color: var(--green);
            background: #f0f8f0;
        }

        .product-photo {
            width: 58px; height: 58px;
            border-radius: 8px;
            object-fit: contain;
            background: #f5f5f5;
            flex-shrink: 0;
            border: 1px solid #eee;
        }
        .product-photo-placeholder {
            width: 58px; height: 58px;
            border-radius: 8px;
            background: #eef5ee;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
            border: 1px solid #d5e8d5;
        }

        .product-info { flex: 1; min-width: 0; }
        .product-name { font-weight: 600; color: #1a2e1a; font-size: 0.88rem; line-height: 1.3; }
        .product-brand { font-size: 0.75rem; color: #aaa; margin-top: 2px; text-transform: uppercase; letter-spacing: .04em; }

        .product-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
        .product-item::after { content: "›"; font-size: 1.4rem; color: #b0ccb0; align-self: center; margin-left: 2px; flex-shrink: 0; transition: color .2s, transform .2s; }
        .product-item:hover::after { color: var(--green); transform: translateX(3px); }
        .product-price { font-weight: 700; color: var(--green); font-size: 1.05rem; white-space: nowrap; }

        .product-stock {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .product-stock.in-stock { background: #d4edda; color: #155724; }
        .product-stock.out-of-stock { background: #f8d7da; color: #721c24; }

        .btn-add-to-cart {
            background: var(--green);
            color: var(--white);
            border: none;
            padding: 7px 14px;
            border-radius: 7px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.8rem;
            font-family: 'Nunito', sans-serif;
            transition: background .15s;
            white-space: nowrap;
        }
        .btn-add-to-cart:hover { background: var(--green-d); }

        .no-products { color: #999; font-size: 0.85rem; font-style: italic; }

        @media (max-width: 520px) {
            .product-item { gap: 8px; padding: 8px 10px 8px 8px; }
            .product-photo, .product-photo-placeholder { width: 44px; height: 44px; font-size: 1.1rem; }
            .product-name { font-size: 0.82rem; }
            .product-price { font-size: 0.95rem; }
            .btn-add-to-cart { padding: 6px 10px; font-size: 0.75rem; }
        }
        

        /* ── Головні вкладки сторінки ── */
        .main-tabs {
            display: flex; gap: 6px; margin-bottom: 24px; flex-wrap: wrap;
        }
        .main-tab {
            padding: 10px 20px; border-radius: 10px; border: 2px solid var(--green-l);
            background: #fff; color: var(--green); font-size: .95rem; font-weight: 700;
            cursor: pointer; transition: all .15s; font-family: 'Nunito', sans-serif;
        }
        .main-tab.active { background: var(--green); color: #fff; border-color: var(--green); }
        .main-tab:hover:not(.active) { background: #e8f5e9; }
        .main-section { display: none; }
        .main-section.active { display: block; }

        /* ── Хвороби і шкідники ── */
        .dp-wrap { padding: 0; }
        .dp-group-tabs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
        .dp-gtab { padding: 4px 12px; border: 0.5px solid #ccc; border-radius: 8px; font-size: 12px;
                   cursor: pointer; background: #fff; color: #555; transition: all .15s; }
        .dp-gtab.active { background: #e8f5e9; color: #1a5c1a; border-color: #2d6a2d; font-weight: 600; }
        .dp-crop-tabs { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 1rem; }
        .dp-ctab { padding: 5px 13px; border: 0.5px solid #ccc; border-radius: 8px; font-size: 13px;
                   cursor: pointer; background: #fff; color: #555; transition: all .15s; }
        .dp-ctab.active { background: #e8f5e9; color: #1a5c1a; border-color: #2d6a2d; font-weight: 600; }
        .dp-legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: .75rem; }
        .dp-leg-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #777; }
        .dp-leg-line { width: 14px; height: 3px; border-radius: 2px; }
        .dp-section-label { font-size: 11px; font-weight: 600; text-transform: uppercase;
                            letter-spacing: .05em; color: #999; margin: 1rem 0 5px; }
        .dp-dlist { display: flex; flex-direction: column; gap: 7px; }
        .dp-card { border: 0.5px solid #e0e0e0; border-radius: 10px; overflow: hidden; }
        .dp-card.disease .dp-hdr { border-left: 3px solid #1D9E75; }
        .dp-card.pest .dp-hdr { border-left: 3px solid #378ADD; }
        .dp-hdr { display: flex; align-items: center; gap: 8px; padding: 8px 13px;
                  cursor: pointer; background: #f8f8f8; }
        .dp-dname { font-size: 13px; font-weight: 600; color: #1a1a1a; flex: 1; }
        .dp-badge { font-size: 11px; padding: 2px 7px; border-radius: 8px; background: #fff;
                    border: 0.5px solid #ddd; color: #777; white-space: nowrap; }
        .dp-chev { font-size: 15px; color: #aaa; transition: transform .2s; }
        .dp-chev.open { transform: rotate(180deg); }
        .dp-body { display: none; padding: 9px 13px; border-top: 0.5px solid #eee; background: #fff; }
        .dp-body.open { display: block; }
        .dp-ptable { width: 100%; border-collapse: collapse; font-size: 12px; }
        .dp-ptable th { text-align: left; color: #888; font-weight: 500; padding: 3px 7px 5px;
                        border-bottom: 0.5px solid #eee; }
        .dp-ptable td { padding: 5px 7px; border-bottom: 0.5px solid #f0f0f0;
                        color: #222; vertical-align: middle; }
        .dp-ptable tr:last-child td { border-bottom: none; }
        .dp-ptable tr:hover td { background: #f8fdf8; }
        .dp-ptable td.dp-prod-name { cursor: pointer; color: var(--green); font-weight: 600; }
        .dp-ptable td.dp-prod-name:hover { text-decoration: underline; }
        .dp-tb { font-size: 11px; padding: 2px 6px; border-radius: 6px; white-space: nowrap; }
        .dp-tb-f { background: #E1F5EE; color: #085041; }
        .dp-tb-i { background: #E6F1FB; color: #0C447C; }
        .dp-tb-a { background: #FAEEDA; color: #633806; }
        .dp-note { font-size: 11px; color: #aaa; margin-top: 7px; padding-top: 7px;
                   border-top: 0.5px solid #eee; }

        /* ── Гербіциди ── */
        .hb-wrap { padding: 0; }
        .hb-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.25rem; }
        .hb-tab { padding: 6px 13px; border-radius: 8px; border: 0.5px solid #ccc;
                  background: #fff; color: #555; font-size: 13px; cursor: pointer; transition: all .15s; }
        .hb-tab.active { background: #dceefb; color: #0C447C; border-color: #378ADD; font-weight: 600; }
        .hb-tab:hover:not(.active) { background: #f0f0f0; }
        .hb-panel { display: none; } .hb-panel.active { display: block; }
        .hb-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media(max-width:560px) { .hb-two-col { grid-template-columns: 1fr; } }
        .hb-card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 10px; padding: 1rem 1.25rem; }
        .hb-card h3 { font-size: 12px; font-weight: 500; color: #888; text-transform: uppercase;
                      letter-spacing: .04em; margin-bottom: .75rem; }
        .hb-ptitle { font-size: 16px; font-weight: 600; color: #1a1a1a; margin-bottom: 1rem;
                     display: flex; align-items: center; gap: 8px; }
        .hb-weed-list { list-style: none; }
        .hb-weed-list li { font-size: 13px; color: #333; padding: 3px 0;
                           border-bottom: 0.5px solid #f0f0f0; display: flex; align-items: flex-start; gap: 6px; }
        .hb-weed-list li:last-child { border-bottom: none; }
        .hb-weed-list li::before { content: "•"; color: #bbb; flex-shrink: 0; }
        .hb-hi { padding: 6px 0; border-bottom: 0.5px solid #f0f0f0; }
        .hb-hi:last-child { border-bottom: none; }
        .hb-hn { font-size: 13px; font-weight: 600; color: var(--green); cursor: pointer; }
        .hb-hn:hover { text-decoration: underline; }
        .hb-hd { font-size: 12px; color: #666; margin-top: 1px; }
        .hb-ht { font-size: 11px; color: #aaa; margin-top: 2px; }
        .hb-badge { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 6px; margin-right: 4px; }
        .hb-bm { background: #e8f5e9; color: #2e7d32; }
        .hb-bd { background: #fff8e1; color: #f57f17; }
        .hb-bu { background: #e3f2fd; color: #0d47a1; }
        .hb-bs { background: #fce4ec; color: #880e4f; }
        .additives-section {
            background: #fff8e1;
            border: 2px solid #f9a825;
            border-radius: 8px;
            padding: 15px;
            margin-top: 12px;
        }
        
        .additives-title { font-weight: 700; color: #e65100; margin-bottom: 12px; }
        
        .additives-tip {
            background: #fff3cd;
            border-left: 3px solid #f9a825;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.82rem;
            color: #856404;
            margin-bottom: 10px;
            line-height: 1.5;
        }
        

        /* Вибір культури (схеми) */
        .scheme-tabs {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .scheme-tab {
            background: var(--white);
            border: 2px solid var(--green);
            color: var(--green);
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            font-family: 'Nunito', sans-serif;
            transition: all var(--t);
        }

        .scheme-tab:hover, .scheme-tab.active {
            background: var(--green);
            color: var(--white);
        }

        /* Вибір етапу */
        .stage-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            padding: 16px;
            background: var(--white);
            border-radius: var(--r-md);
            box-shadow: var(--sh-1);
        }

        .stage-tab {
            background: #f0f8f0;
            border: 2px solid var(--green-l);
            color: var(--green);
            padding: 8px 16px;
            border-radius: var(--r-lg);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            font-family: 'Nunito', sans-serif;
            transition: all var(--t);
            white-space: nowrap;
        }

        .stage-tab:hover, .stage-tab.active {
            background: var(--green);
            color: var(--white);
            border-color: var(--green);
        }

        /* Деталі етапу */
        .stage-detail {
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .schemes-header h1 { font-size: 1.8rem; }
            .category-grid { grid-template-columns: 1fr; }
            .product-item { flex-direction: column; align-items: flex-start; gap: 8px; }
        }
    </style>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#2d6a2d">
</head>
<body>
    <div class="schemes-container">
        <div class="schemes-header">
            <h1>📋 Схеми захисту і вирощування</h1>
        </div>

        <div class="main-tabs">
            <button class="main-tab active" onclick="switchTab('schemes')">📋 Схеми захисту</button>
            <button class="main-tab" onclick="switchTab('diseases')">🦠 Хвороби і шкідники</button>
            <button class="main-tab" onclick="switchTab('herbicides')">🌿 Гербіциди</button>
        </div>


        <!-- ── Діагностика по фото ── -->
        <div id="diagnose-bar" style="background:linear-gradient(135deg,#f0f8f0,#e8f5e8);border:1.5px solid #c8e0c8;border-radius:14px;padding:16px 18px;margin:14px 0 4px;max-width:760px;">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
            <span style="font-size:1.3rem">🔬</span>
            <div style="flex:1;min-width:200px">
              <b style="color:#1a3e1a;font-size:.97rem">Визначити хворобу, шкідника або бур'ян по фото</b>
              <div style="font-size:.82rem;color:#555;margin-top:2px">Завантажте фото — AI підбере препарати з нашого каталогу</div>
            </div>
            <label id="diagnose-btn" style="display:inline-flex;align-items:center;gap:7px;background:#2d6a2d;color:#fff;padding:9px 16px;border-radius:9px;cursor:pointer;font-weight:700;font-size:.9rem;white-space:nowrap;">
              📷 Завантажити фото
              <input type="file" id="diagnose-file" accept="image/*" capture="environment" style="position:absolute;left:-9999px;opacity:0;width:1px;height:1px;">
            </label>
          </div>
          <div id="diagnose-result" style="display:none;margin-top:14px;border-top:1px solid #cde8cd;padding-top:12px;"></div>
        </div>

        <script>
        (function(){
          var fileInput = document.getElementById('diagnose-file');
          var resultBox = document.getElementById('diagnose-result');
          if (!fileInput) return;

          fileInput.addEventListener('change', function(e) {
            var file = e.target.files[0];
            if (!file) return;
            diagnose(file);
            // Скидаємо щоб можна було завантажити ще раз те ж фото
            fileInput.value = '';
          });

          function diagnose(file) {
            resultBox.style.display = 'block';
            resultBox.innerHTML = '<div style="display:flex;align-items:center;gap:10px;color:#555;"><span style="font-size:1.4rem">⏳</span> Аналізуємо фото...</div>';

            var fd = new FormData();
            fd.append('photo', file);

            fetch('/api/diagnose', { method: 'POST', body: fd })
              .then(function(r) { return r.json(); })
              .then(function(d) { renderResult(d, file); })
              .catch(function(e) {
                resultBox.innerHTML = '<div style="color:#c0392b;">❌ Помилка зв'язку: ' + e.message + '</div>';
              });
          }

          function renderResult(d, file) {
            if (!d.ok) {
              resultBox.innerHTML = '<div style="color:#c0392b;">❌ ' + esc(d.error || 'Невідома помилка') + '</div>';
              return;
            }

            var typeIcon = d.type === 'disease' ? '🍂' : d.type === 'pest' ? '🐛' : d.type === 'weed' ? '🌿' : '❓';
            var typeLabel = d.type === 'disease' ? 'Хвороба' : d.type === 'pest' ? 'Шкідник' : d.type === 'weed' ? 'Бур'ян' : 'Не визначено';
            var confColor = d.confidence === 'high' ? '#2d6a2d' : d.confidence === 'medium' ? '#b8860b' : '#888';
            var confLabel = d.confidence === 'high' ? 'висока впевненість' : d.confidence === 'medium' ? 'середня впевненість' : 'низька впевненість';

            // Preview фото
            var imgUrl = URL.createObjectURL(file);
            var preview = '<img src="' + imgUrl + '" style="max-width:120px;max-height:100px;border-radius:8px;object-fit:cover;flex-shrink:0;" alt="фото">';

            // Продукти
            var prods = '';
            if (d.products && d.products.length) {
              prods = '<div style="margin-top:10px"><b style="font-size:.88rem;color:#1a3e1a;">🛒 Рекомендовані препарати:</b><div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;">';
              d.products.forEach(function(p) {
                prods += '<a href="/p/' + esc(p.slug) + '" style="display:inline-flex;flex-direction:column;padding:7px 12px;border:1.5px solid #2d6a2d;border-radius:8px;text-decoration:none;background:#f0f8f0;min-width:130px;">'
                  + '<span style="font-size:.82rem;font-weight:700;color:#1a3e1a;">' + esc(p.n) + '</span>'

    <script>
        const DEBUG = false;
        function escapeHtml(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

        let protectionSchemes = null;
        let products = null;
        const SITE_VERSION = '20260527';

        async function loadData() {
            try {
                // Схеми з D1 (/api/protection-schemes, керується в /admin/schemes); fallback — статичний файл
                let schemesResp = await fetch('/api/protection-schemes?v=' + SITE_VERSION);
                if (!schemesResp.ok) schemesResp = await fetch('./protection_schemes.json?v=' + SITE_VERSION);
                if (!schemesResp.ok) throw new Error('схеми захисту не знайдено');
                protectionSchemes = await schemesResp.json();

                const productsResp = await fetch('./products.json?v=' + SITE_VERSION);
                if (!productsResp.ok) throw new Error('products.json не знайдено');
                const rawProducts = await productsResp.json();

                // img-map: кешуємо у sessionStorage
                let imgs = {};
                const cached = sessionStorage.getItem('agronom_img_map_v2');
                if (cached) {
                    imgs = JSON.parse(cached);
                } else {
                    const imgResp = await fetch('./img-map.json');
                    if (imgResp.ok) {
                        imgs = await imgResp.json();
                        try { sessionStorage.setItem('agronom_img_map_v2', JSON.stringify(imgs)); } catch(e) {}
                    }
                }

                products = rawProducts.map(function(p) {
                    return Object.assign({}, p, { img: imgs[p.n] || p.img || '' });
                });
                window.allProducts = products; // глобально для dpInit та searchPreparat

                if (DEBUG) console.log('✅ Схеми завантажені');
                if (DEBUG) console.log('✅ Товари завантажені:', products.length, '| з фото:', products.filter(function(p){return p.img;}).length);
                // renderCategories викликається ззовні після перевірки URL-параметрів
            } catch(e) {
                console.error('❌ Помилка:', e);
                document.getElementById('categories').innerHTML = `
                    <div style="grid-column: 1/-1; background: #ffe8e8; border: 2px solid #d9534f; 
                                padding: 20px; border-radius: 8px; color: #d9534f;">
                        <h3>❌ ${e.message}</h3>
                        <p>Перевірте консоль (F12)</p>
                    </div>
                `;
            }
        }
        
        function renderCategories() {
            if (!protectionSchemes) return;
            const container = document.getElementById('categories');
            let html = '';
            
            for (const [key, category] of Object.entries(protectionSchemes.protection_schemes)) {
                html += `
                    <div class="category-card" onclick="showSchemes('${key}')" style="border-color: ${category.color}">
                        <div class="category-icon">${category.icon}</div>
                        <div class="category-name">${category.uk_name}</div>

            }

        function findProductsForTreatment(treatment) {
            if (!products) return [];
            const treatmentKeywords = treatment.products || [];
            const foundProducts = [];
            const seen = new Set();

            // Шукаємо ТОЧНО по назві препарату зі списку products в схемі
            for (const keyword of treatmentKeywords) {
                const kwLower = keyword.toLowerCase();
                for (const product of products) {
                    const productName = product.n.toLowerCase();
                    const productCategory = (product.c || '').toLowerCase();
                    if (!productCategory.includes('агрохімік')) continue;
                    if (productName.includes(kwLower) && !seen.has(product.n)) {
                        foundProducts.push(product);
                        seen.add(product.n);
                    }
                }
            }

            return foundProducts;
        }

        
        function findAdditivesForTreatment(treatment) {
            if (!products || !treatment.additives || !treatment.additives.length) return [];
            const found = [];
            const seen = new Set();
            for (const keyword of treatment.additives) {
                const kwLower = keyword.toLowerCase();
                for (const product of products) {
                    const name = product.n.toLowerCase();
                    const cat = (product.c || '').toLowerCase();
                    if (!cat.includes('агрохімік')) continue;
                    // Точне співпадіння: назва препарату має починатись з ключового слова
                const kwClean = kwLower.trim();
                const nameStart = name.startsWith(kwClean + ',') || name.startsWith(kwClean + ' ') || name === kwClean;
                if (nameStart && !seen.has(product.n)) {
                        found.push(product);
                        seen.add(product.n);
                    }
                }
            }
            return found;
        }

        // ── Автовибір етапу за поточним місяцем ───────────
        const MONTH_NAMES = {
            'січень':1,'лютого':1,'лютий':2,'березень':3,'берез':3,
            'квітень':4,'квітн':4,'травень':5,'трав':5,'червень':6,'черв':6,
            'липень':7,'лип':7,'серпень':8,'серп':8,'вересень':9,'верес':9,
            'жовтень':10,'жовт':10,'листопад':11,'листопад':11,'грудень':12,'груд':12
        };

        function extractMonths(text) {
            const t = text.toLowerCase();
            const found = [];
            for (const [name, m] of Object.entries(MONTH_NAMES)) {
                if (t.includes(name)) found.push(m);
            }
            return [...new Set(found)].sort((a,b)=>a-b);
        }

        function bestStageIdx(treatments) {
            const now = new Date().getMonth() + 1; // 1-12
            let bestIdx = 0, bestScore = -1;

            treatments.forEach(function(t, i) {
                const months = extractMonths(t.stage + ' ' + (t.date||''));
                if (!months.length) return;

                // Знаходимо мінімальну відстань до поточного місяця
                let minDist = 12;
                months.forEach(function(m) {
                    // Кільцева відстань (рік циклічний)
                    const d = Math.min(Math.abs(m - now), 12 - Math.abs(m - now));
                    if (d < minDist) minDist = d;
                });

                // Якщо місяць потрапляє у діапазон — відстань 0
                if (months.length >= 2) {
                    const lo = months[0], hi = months[months.length - 1];
                    if (now >= lo && now <= hi) minDist = 0;
                }

                const score = 12 - minDist;
                if (score > bestScore) { bestScore = score; bestIdx = i; }
            });

            return bestIdx;
        }

                // Коротка назва: якщо є " — ", берємо частину після тире
                const parts = s.name.split(/\s*[—-]\s*/);
                let label;
                if (parts.length >= 2) {
                    // "Яблуня — схема Syngenta" → "Яблуня · Syngenta"
                    // "Яблуня — повна схема захисту" → "Яблуня · повна"
                    const right = parts.slice(1).join(' ')
                        .replace(/схема\s*/i, '')
                        .replace(/Syngenta/i, '')
                        .replace(/захисту?/i, '')
                        .trim();
                    label = parts[0].trim() + (right ? ' · ' + right : '');
                } else {
                    label = s.name;

                const synBadge = isSyn

                html += '<button class="scheme-tab' + active + '"' + synStyle + ' onclick="selectScheme(' + i + ')">' + label + synBadge + '</button>';
            });
            html += '</div>';

            // ── 2. Кнопки етапів ───────────────────────────────
            const autoStage = bestStageIdx(scheme.treatments);
            html += '<div class="stage-tabs">';
            scheme.treatments.forEach(function(t, i) {
                const active = i === currentStageIdx ? ' active' : '';

                html += '<button class="stage-tab' + active + '" onclick="selectStage(' + i + ')">' + label + badge + '</button>';
            });
            html += '</div>';

            // ── 3. Деталі поточного етапу ──────────────────────
            html += renderTreatment(scheme.treatments[currentStageIdx]);

            schemesContainer.innerHTML = html;
        }

                    html += '<div class="product-right">';

            } else {

            html += '</div>';

            // Бакова суміш
            if (additives.length > 0) {

                html += '&nbsp;&nbsp;• <b>Рання весна</b> — Залізо + Мікс: відновлення після зими, профілактика хлорозу<br>';

                html += '</div>';
                html += '<div class="products-list">';
                additives.forEach(function(product) {
                    const inStock    = product.inStock !== false;

function switchTab(name) {
    document.querySelectorAll('.main-tab').forEach(function(b, i) {
        var names = ['schemes','diseases','herbicides'];
        b.classList.toggle('active', names[i] === name);
    });
    document.querySelectorAll('.main-section').forEach(function(s) {
        s.classList.remove('active');
    });
    var el = document.getElementById('tab-' + name);
    if (el) el.classList.add('active');
    if (name === 'diseases' && !window._dpInited) dpInit();
    if (name === 'herbicides' && !window._hbInited) hbInit();
}

// Пошук препарату в каталозі по назві (без дозування)
// ════════════════════════════════════════════════════
function searchPreparat(rawName) {
    // Витягуємо назву і дозування: "Сальто, 30 мл" → name="сальто", dose=30
    var doseMatch = rawName.match(/(\d+(?:\.\d+)?)\s*(мл|г|кг|л)/i);
    var dose = doseMatch ? parseFloat(doseMatch[1]) : null;
    var name = rawName.replace(/,.*$/, '').trim().toLowerCase();
    if (!name) return;

    function score(pname) {
        var n = pname.toLowerCase();
        if (n === name) return 100;
        if (n.indexOf(name + ',') === 0 || n.indexOf(name + ' ') === 0) return 90;
        if (n.split(',')[0].trim() === name) return 80;
        return 0;
    }

    function getDose(pname) {
        var m = pname.match(/(\d+(?:\.\d+)?)\s*(мл|г|кг|л)/i);
        return m ? parseFloat(m[1]) : null;
    }

    function bestByDose(matches) {
        if (!dose) return matches[0];
        var best = matches[0];
        var bestDiff = 9999;
        for (var i = 0; i < matches.length; i++) {
            var d = getDose(matches[i].p.n || '');
            var diff = d !== null ? Math.abs(d - dose) : 9999;
            if (diff < bestDiff) { bestDiff = diff; best = matches[i]; }
        }
        return best;
    }

    // Шукаємо в allProducts
    var all = window.allProducts || [];
    var allMatches = [];
    for (var i = 0; i < all.length; i++) {
        var s = score(all[i].n || '');
        if (s >= 80) allMatches.push({p: all[i], s: s});
    }
    allMatches.sort(function(a,b){return b.s-a.s;});

    if (allMatches.length) {
        var best = bestByDose(allMatches);
        if (best.p.slug) { window.location.href = '/p/' + best.p.slug; return; }
    }

    // Fallback — productRegistry (схеми захисту)
    var reg = productRegistry || [];
    var regMatches = [];
    for (var j = 0; j < reg.length; j++) {
        var s2 = score(reg[j].n || '');
        if (s2 >= 80) regMatches.push({p: reg[j], i: j, s: s2});
    }
    if (regMatches.length) {
        openProductCard(bestByDose(regMatches).i);
        return;
    }

    window.location.href = '/index.html?search=' + encodeURIComponent(name);
}

var _dpCg, _dpCc;

function dpTl(t) {
    if (t === F) return '<span class="dp-tb dp-tb-f">фунгіцид</span>';
    if (t === I) return '<span class="dp-tb dp-tb-i">інсектицид</span>';
    return '<span class="dp-tb dp-tb-a">акарицид</span>';
}

function dpMkCard(item, kind) {
    var rows = item.p.map(function(p) {
        var name = p.n;
        var safeName = name.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
        return '<tr><td class="dp-prod-name" data-prep="' + safeName + '">' + escapeHtml(name) +
            '</td><td>' + dpTl(p.t) + '</td></tr>';
    }).join('');
    return '<div class="dp-card ' + kind + '">' +
        '<div class="dp-hdr" onclick="dpToggle(this)">' +
        '<span class="dp-dname">' + escapeHtml(item.d) + '</span>' +
        '<span class="dp-badge">' + item.p.length + ' препарат' + (item.p.length === 1 ? '' : 'ів') + '</span>' +
        '<span class="dp-chev">▾</span>' +
        '</div>' +
        '<div class="dp-body">' +
        '<table class="dp-ptable"><thead><tr><th>Препарат</th><th>Тип</th></tr></thead>' +
        '<tbody>' + rows + '</tbody></table>' +
        '<p class="dp-note">Натисніть на назву препарату, щоб відкрити картку товару</p>' +
        '</div></div>';
}

function dpRender() {
    var listEl = document.getElementById('dp-list');
    if (!listEl) return;
    listEl.innerHTML = '';
    var crop = DATA[_dpCc];
    if (!crop) return;
    var html = '';
    if (crop.diseases && crop.diseases.length) {
        html += '<div class="dp-section-label">Хвороби</div><div class="dp-dlist">';
        crop.diseases.forEach(function(i) { html += dpMkCard(i, 'disease'); });
        html += '</div>';
    }
    if (crop.pests && crop.pests.length) {
        html += '<div class="dp-section-label">Шкідники</div><div class="dp-dlist">';
        crop.pests.forEach(function(i) { html += dpMkCard(i, 'pest'); });
        html += '</div>';
    }
    listEl.innerHTML = html;
}

function dpRenderCT() {
    var ctabsEl = document.getElementById('dp-ctabs');
    if (!ctabsEl) return;
    ctabsEl.innerHTML = '';
    GROUPS[_dpCg].forEach(function(crop) {
        var b = document.createElement('button');
        b.className = 'dp-ctab' + (crop === _dpCc ? ' active' : '');
        b.textContent = crop;
        b.onclick = function() {
            _dpCc = crop;
            ctabsEl.querySelectorAll('.dp-ctab').forEach(function(x) { x.classList.remove('active'); });
            b.classList.add('active');
            dpRender();
        };
        ctabsEl.appendChild(b);
    });
}

function dpToggle(hdr) {
    var body = hdr.nextElementSibling;
    var chev = hdr.querySelector('.dp-chev');
    body.classList.toggle('open');
    if (chev) chev.classList.toggle('open');
}

function dpInit() {
    window._dpInited = true;
    var gtabsEl = document.getElementById('dp-gtabs');
    if (!gtabsEl) return;
    _dpCg = Object.keys(GROUPS)[0];
    _dpCc = GROUPS[_dpCg][0];
    Object.keys(GROUPS).forEach(function(g) {
        var b = document.createElement('button');
        b.className = 'dp-gtab' + (g === _dpCg ? ' active' : '');
        b.textContent = g;
        b.onclick = function() {
            _dpCg = g;
            _dpCc = GROUPS[g][0];
            gtabsEl.querySelectorAll('.dp-gtab').forEach(function(x) { x.classList.remove('active'); });
            b.classList.add('active');
            dpRenderCT();
            dpRender();
        };
        gtabsEl.appendChild(b);
    });
    dpRenderCT();
    dpRender();
}

function hbBadge(c) {
    var map = { m: ['hb-bm','мінімальний ризик'], d: ['hb-bd','обережно'], u: ['hb-bu','умовно'], s: ['hb-bs','суцільної дії'] };
    var v = map[c] || ['',''];
    return '<span class="hb-badge ' + v[0] + '">' + v[1] + '</span>';
}

function hbInit() {
    window._hbInited = true;
    var tabsEl = document.getElementById('hb-tabs');
    var panelsEl = document.getElementById('hb-panels');
    if (!tabsEl || !panelsEl) return;

    crops.forEach(function(crop, i) {
        var tab = document.createElement('button');
        tab.className = 'hb-tab' + (i === 0 ? ' active' : '');
        tab.textContent = crop.emoji + ' ' + crop.name;
        tab.onclick = function() {
            document.querySelectorAll('.hb-tab').forEach(function(t) { t.classList.remove('active'); });
            document.querySelectorAll('.hb-panel').forEach(function(p) { p.classList.remove('active'); });
            tab.classList.add('active');
            document.getElementById('hb-p-' + crop.id).classList.add('active');
        };
        tabsEl.appendChild(tab);

        var herbRows = crop.herbs.map(function(h) {
            var safeName = h.n.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
            return '<div class="hb-hi">' +
                '<div class="hb-hn" data-prep="' + safeName + '">' +
                escapeHtml(h.n) + ' →</div>' +
                '<div class="hb-hd">' + escapeHtml(h.d) + '</div>' +
                '<div class="hb-ht">Проти: ' + escapeHtml(h.t) + ' ' + hbBadge(h.c) + '</div>' +
                '</div>';
        }).join('');

        var weedItems = crop.weeds.map(function(w) {
            return '<li>' + escapeHtml(w) + '</li>';
        }).join('');

        var panel = document.createElement('div');
        panel.className = 'hb-panel' + (i === 0 ? ' active' : '');
        panel.id = 'hb-p-' + crop.id;
        panel.innerHTML =
            '<div class="hb-ptitle">' + crop.emoji + ' ' + escapeHtml(crop.name) + '</div>' +
            '<div class="hb-two-col">' +
            '<div class="hb-card"><h3>Типові бур&#39;яни</h3><ul class="hb-weed-list">' + weedItems + '</ul></div>' +
            '<div class="hb-card"><h3>Препарати</h3>' + herbRows + '</div>' +
            '</div>';
        panelsEl.appendChild(panel);
    });
}

    <div id="cart-float" onclick="goToCart()" aria-label="Відкрити кошик"
         style="position:fixed;bottom:20px;right:20px;color:white;
                padding:12px 20px;border-radius:30px;cursor:pointer;font-family:'Nunito',sans-serif;
                font-weight:700;font-size:0.95rem;box-shadow:0 4px 16px rgba(0,0,0,0.25);

    </div>

    <script>
    // ── Кошик: shared localStorage з іншими сторінками ──────────
    (function () {
        const CART_KEY = 'agronom_cart';

        function loadCart() {
            try { return JSON.parse(localStorage.getItem(CART_KEY)) || []; }
            catch(e) { return []; }
        }
        function saveCart(cart) {
            localStorage.setItem(CART_KEY, JSON.stringify(cart));
        }
        function updateFloat(cart) {
            const total = cart.reduce(function(s, i) { return s + i.q; }, 0);
            const el    = document.getElementById('cart-count');
            const flt   = document.getElementById('cart-float');
            if (el) el.textContent = total;
            if (flt) flt.style.display = total > 0 ? 'flex' : 'none';
        }

        // Глобальна функція — викликається кнопками в renderTreatment
        window.addToCartScheme = function(name, price, btn) {
            const cart = loadCart();
            const item = cart.find(function(i) { return i.n === name; });
            if (item) {
                item.q++;
            } else {
                cart.push({ n: name, p: price, q: 1 });
            }
            saveCart(cart);
            updateFloat(cart);
            if (btn) {
                const card = btn.closest ? btn.closest('.product-item') : null;
                btn.textContent = '✓ Додано';
                btn.style.background = '#1a3a1a';
                if (card) card.classList.add('added');
                setTimeout(function() {
                    btn.textContent = '🛒 Додати';
                    btn.style.background = '';
                    if (card) card.classList.remove('added');
                }, 900);
            }
        };

        window.goToCart = function() {
            window.location.href = 'index.html';
        };

        // Ініціалізація при завантаженні
        document.addEventListener('DOMContentLoaded', function() {
            updateFloat(loadCart());
        });
    })();
    </script>

        : '<span style="background:#f8d7da;color:#721c24;padding:3px 10px;border-radius:10px;font-size:.78rem;font-weight:600;">❌ немає</span>';

    var addBtnHtml = inStock
        ? '<button id="scheme-modal-add-btn" onclick="addFromSchemeModal(' + idx + ')" style="flex:1;padding:13px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:bold;cursor:pointer;">🛒 Додати в кошик</button>'
        : '<button disabled style="flex:1;padding:13px;background:#ccc;color:#888;border:none;border-radius:10px;font-size:1rem;font-weight:bold;cursor:not-allowed;">❌ Немає в наявності</button>';

    var qtyTxt = schemeQtyBadgeText(p.n);
    var cartQtyHtml = '<span id="scheme-modal-qty" style="background:#ff7a00;color:#fff;border:2px solid #fff;border-radius:12px;padding:3px 10px;font-size:.8rem;font-weight:800;box-shadow:0 1px 4px rgba(0,0,0,.25);' + (qtyTxt ? '' : 'display:none;') + '">' + qtyTxt + '</span>';

    var modal = document.createElement('div');
    modal.id = 'scheme-product-modal';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:20000;padding:16px;box-sizing:border-box;';

    modal.innerHTML =
        '<div style="background:#fff;border-radius:16px;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.3);position:relative;box-sizing:border-box;">'
        + '<button onclick="closeProductCard()" style="position:absolute;top:12px;right:14px;background:none;border:none;font-size:1.6rem;cursor:pointer;color:#888;line-height:1;">✕</button>'
        + '<h3 style="margin:0 0 4px;padding-right:28px;font-size:1.05rem;color:#1a2e1a;line-height:1.4;">' + escapeHtml(p.n) + '</h3>'
        + brandHtml
        + '<div style="display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px;">'
        +   '<span style="font-size:1.25rem;font-weight:800;color:var(--green);">' + priceText + '</span>'
        +   stockBadge
        +   cartQtyHtml
        + '</div>'
        + (p.slug ? '<a href="/p/' + p.slug + '" style="display:inline-block;margin:0 0 12px;color:var(--green);font-weight:700;text-decoration:none;border-bottom:1px solid var(--green);">🔗 Відкрити сторінку товару →</a>' : '')
        + imgHtml
        + annotHtml
        + '<div style="display:flex;gap:10px;margin-top:4px;position:sticky;bottom:0;background:#fff;padding-top:12px;box-shadow:0 -8px 10px -8px rgba(0,0,0,0.15);">'
        +   addBtnHtml
        +   '<button onclick="closeProductCard()" style="padding:13px 18px;background:#f0f0f0;color:#555;border:none;border-radius:10px;font-size:1rem;font-weight:bold;cursor:pointer;">Закрити</button>'
        + '</div>'
        + '</div>';

    document.body.appendChild(modal);
    modal.addEventListener('click', function(e) { if (e.target === modal) closeProductCard(); });
};

window.addFromSchemeModal = function(idx) {
    var p = productRegistry[idx];
    if (!p || p.inStock === false) return;
    var CART_KEY = 'agronom_cart';
    var cart;
    try { cart = JSON.parse(localStorage.getItem(CART_KEY)) || []; } catch(e) { cart = []; }
    var item = cart.find(function(i) { return i.n === p.n; });
    if (item) { item.q++; } else { cart.push({ n: p.n, p: p.p, q: 1 }); }
    localStorage.setItem(CART_KEY, JSON.stringify(cart));

    // оновити лічильник плаваючої кнопки
    var total = cart.reduce(function(s, i) { return s + i.q; }, 0);
    var countEl = document.getElementById('cart-count');
    var fltEl   = document.getElementById('cart-float');
    if (countEl) countEl.textContent = total;
    if (fltEl)   fltEl.style.display = total > 0 ? 'flex' : 'none';

    // оновити бейдж "у кошику" в модалці
    var qtyEl = document.getElementById('scheme-modal-qty');
    if (qtyEl) { var t = schemeQtyBadgeText(p.n); qtyEl.textContent = t; qtyEl.style.display = t ? '' : 'none'; }

    // фідбек на кнопці
    var btn = document.getElementById('scheme-modal-add-btn');
    if (btn) {
        btn.textContent = '✓ Додано!';
        btn.style.background = '#1a3a1a';
        setTimeout(function() {
            btn.textContent = '🛒 Додати в кошик';
            btn.style.background = 'var(--green)';
        }, 1000);
    }
};

window.closeProductCard = function() {
    var m = document.getElementById('scheme-product-modal');
    if (m) m.remove();
};
</script>
