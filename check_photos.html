<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Перевірка фото</title>
<meta name="robots" content="noindex,nofollow">
<style>
  body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
  h1 { color: #2d6a2d; }
  .stats { display: flex; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
  .stat { background: white; padding: 15px 25px; border-radius: 10px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .stat .num { font-size: 2rem; font-weight: bold; }
  .stat .num.ok   { color: #27ae60; }
  .stat .num.bad  { color: #e74c3c; }
  .stat .num.none { color: #f39c12; }
  .stat .label { font-size: 0.85rem; color: #666; }
  .filters { margin: 15px 0; display: flex; gap: 10px; flex-wrap: wrap; }
  button { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: bold; }
  .btn-all  { background: #2d6a2d; color: white; }
  .btn-bad  { background: #e74c3c; color: white; }
  .btn-none { background: #f39c12; color: white; }
  .btn-ok   { background: #27ae60; color: white; }
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  th { background: #2d6a2d; color: white; padding: 10px 12px; text-align: left; font-size: 0.85rem; }
  td { padding: 8px 12px; border-bottom: 1px solid #eee; font-size: 0.82rem; }
  tr:hover td { background: #f9f9f9; }
  .ok-row   td:first-child { border-left: 4px solid #27ae60; }
  .bad-row  td:first-child { border-left: 4px solid #e74c3c; }
  .none-row td:first-child { border-left: 4px solid #f39c12; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
  .badge-ok   { background: #d4edda; color: #155724; }
  .badge-bad  { background: #f8d7da; color: #721c24; }
  .badge-none { background: #fff3cd; color: #856404; }
  img.thumb { width: 40px; height: 40px; object-fit: contain; border-radius: 4px; background: #f0f0f0; }
  #progress { background: #e0e0e0; border-radius: 8px; height: 12px; margin: 10px 0; }
  #progress-bar { background: #2d6a2d; height: 12px; border-radius: 8px; width: 0%; transition: width 0.1s; }
  #status { color: #666; font-size: 0.85rem; margin: 5px 0 15px; }
  input[type=text] { padding: 8px 12px; border: 1px solid #ccc; border-radius: 8px; width: 300px; font-size: 0.9rem; }
</style>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#2d6a2d">
</head>
<body>

<h1>🔍 Перевірка фото товарів</h1>

<div id="progress"><div id="progress-bar"></div></div>
<div id="status">Завантаження products.json...</div>

<div class="stats" id="stats" style="display:none">
  <div class="stat"><div class="num ok" id="cnt-ok">0</div><div class="label">✅ Фото є</div></div>
  <div class="stat"><div class="num bad" id="cnt-bad">0</div><div class="label">❌ Файл не знайдено (404)</div></div>
  <div class="stat"><div class="num none" id="cnt-none">0</div><div class="label">📦 Без фото (плейсхолдер)</div></div>
  <div class="stat"><div class="num" id="cnt-total">0</div><div class="label">Всього товарів</div></div>
</div>

<div class="filters" id="filters" style="display:none">
  <input type="text" id="search" placeholder="Пошук за назвою..." oninput="filterTable()">
  <button class="btn-all"  onclick="showFilter('all')">Всі</button>
  <button class="btn-bad"  onclick="showFilter('bad')">❌ 404</button>
  <button class="btn-none" onclick="showFilter('none')">📦 Без фото</button>
  <button class="btn-ok"   onclick="showFilter('ok')">✅ Є фото</button>
</div>

<table id="table" style="display:none">
  <thead>
    <tr>
      <th>Назва товару</th>
      <th>Категорія</th>
      <th>Шлях до фото</th>
      <th>Статус</th>
      <th>Фото</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<script>
let allRows = [];
let currentFilter = 'all';

async function checkImage(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload  = () => resolve('ok');
    img.onerror = () => resolve('bad');
    img.src = src + '?t=' + Date.now();
  });
}

async function main() {
  let products;
  try {
    const r = await fetch('products.json?v=' + Date.now());
    products = await r.json();
  } catch(e) {
    document.getElementById('status').textContent = '❌ Не вдалось завантажити products.json: ' + e;
    return;
  }

  document.getElementById('cnt-total').textContent = products.length;
  document.getElementById('stats').style.display   = 'flex';
  document.getElementById('filters').style.display = 'flex';
  document.getElementById('table').style.display   = 'table';

  let ok = 0, bad = 0, none = 0;
  const bar    = document.getElementById('progress-bar');
  const status = document.getElementById('status');
  const tbody  = document.getElementById('tbody');

  // Перевіряємо пакетами по 20
  const BATCH = 20;
  for (let i = 0; i < products.length; i += BATCH) {
    const batch = products.slice(i, i + BATCH);
    await Promise.all(batch.map(async (p, bi) => {
      const idx = i + bi;
      let result, imgHtml, badgeCls, badgeTxt, rowCls;

      if (!p.img) {
        result   = 'none';
        imgHtml  = '<span style="color:#ccc">—</span>';
        badgeCls = 'badge-none';
        badgeTxt = '📦 Немає';
        rowCls   = 'none-row';
        none++;
      } else {
        result = await checkImage(p.img);
        if (result === 'ok') {
          imgHtml  = `<img class="thumb" src="${p.img}">`;
          badgeCls = 'badge-ok';
          badgeTxt = '✅ Є';
          rowCls   = 'ok-row';
          ok++;
        } else {
          imgHtml  = '<span style="color:#e74c3c">404</span>';
          badgeCls = 'badge-bad';
          badgeTxt = '❌ 404';
          rowCls   = 'bad-row';
          bad++;
        }
      }

      const row = {
        name: p.n, cat: p.c, img: p.img || '', result, rowCls, badgeCls, badgeTxt, imgHtml
      };
      allRows[idx] = row;

      const tr = document.createElement('tr');
      tr.className = rowCls;
      tr.dataset.result = result;
      tr.dataset.name   = p.n.toLowerCase();
      tr.innerHTML = `
        <td>${p.n}</td>
        <td>${p.c}</td>
        <td style="font-size:0.75rem;color:#888">${p.img || '—'}</td>
        <td><span class="badge ${badgeCls}">${badgeTxt}</span></td>
        <td>${imgHtml}</td>
      `;
      tbody.appendChild(tr);
    }));

    // Оновлюємо прогрес
    const pct = Math.round(Math.min(i + BATCH, products.length) / products.length * 100);
    bar.style.width = pct + '%';
    status.textContent = `Перевіряємо... ${Math.min(i+BATCH, products.length)} / ${products.length}`;
    document.getElementById('cnt-ok').textContent   = ok;
    document.getElementById('cnt-bad').textContent  = bad;
    document.getElementById('cnt-none').textContent = none;
  }

  bar.style.width = '100%';
  status.textContent = `✅ Перевірку завершено! Є: ${ok} | 404: ${bad} | Без фото: ${none}`;
}

function showFilter(f) {
  currentFilter = f;
  filterTable();
}

function filterTable() {
  const q = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('#tbody tr').forEach(tr => {
    const matchFilter = currentFilter === 'all' || tr.dataset.result === currentFilter;
    const matchSearch = !q || tr.dataset.name.includes(q);
    tr.style.display = matchFilter && matchSearch ? '' : 'none';
  });
}

main();
</script>
</body>
</html>
