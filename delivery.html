<div id="site-footer"></div>
<script src="/site-config"></script>
<script src="footer.js"></script>
<script>
/* Тіло сторінки — з БД (/admin/pages). Inline-вміст вище = fallback (працює без JS / для SEO). */
(function(){
  fetch('/api/page?slug=delivery').then(function(r){ return r.ok ? r.json() : null; }).then(function(d){
    if (!d || !d.body_html) return;
    var m = document.getElementById('cms-body'); if (m) m.innerHTML = d.body_html;
    if (d.title) document.title = d.title;
    if (d.meta_desc){ var md = document.querySelector('meta[name="description"]'); if (md) md.setAttribute('content', d.meta_desc); }
  }).catch(function(){});
})();
</script>
</body>
